name: Python application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: groceror
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: sudo apt-get install -y libpq-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # sqlmodel==0.0.8 declares fastapi<=0.103.2, which pip's backtracking
        # resolver can satisfy by downgrading starlette. Pin starlette via a
        # constraints file so it is never downgraded regardless of transitive deps.
        echo "starlette==0.35.1" > /tmp/constraints.txt
        pip install -r requirements.txt -c /tmp/constraints.txt
        pip install "pika>=1.3.2" "httpx>=0.27" "pytest>=7.4" "pytest-asyncio>=0.23" -c /tmp/constraints.txt
        python -c "import starlette; print('starlette:', starlette.__version__)"

    - name: Create config file
      run: |
        cat > .config.yml << 'EOF'
        groceror:
          db:
            DB_USER: "postgres"
            DB_HOST: "localhost"
            DB_PORT: "5432"
            DB_PASSWORD: "postgres"
            DB_NAME: "groceror"
            DB_DRIVER: "postgresql"
          jwt:
            JWT_ALGORITHM: "HS256"
            JWT_SECRET_KEY: "ci-test-secret-key"
          google_maps: "placeholder"
          rabbitmq:
            host: "localhost"
            port: 5672
            user: "guest"
            password: "guest"
            virtual_host: "/"
        EOF

    - name: Run unit tests
      run: pytest tests/unit/ -v
